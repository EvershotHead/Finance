# Factor calculation configuration

# General settings
general:
  annual_trading_days: 252
  risk_free_rate: 0.02  # 2% annualized

# Return windows (trading days)
return_windows:
  - 1
  - 3
  - 5
  - 10
  - 20
  - 60
  - 120
  - 252

# Volatility windows
volatility_windows:
  - 20
  - 60
  - 120
  - 252

# Max drawdown windows
drawdown_windows:
  - 20
  - 60
  - 120
  - 252

# Moving average periods
ma_periods:
  - 5
  - 10
  - 20
  - 60
  - 120
  - 250

# RSI periods
rsi_periods:
  - 6
  - 14
  - 24

# Bollinger bands
bollinger:
  period: 20
  std_dev: 2

# MACD
macd:
  fast: 12
  slow: 26
  signal: 9

# ATR
atr:
  period: 14

# Amihud illiquidity
amihud:
  window: 20

# Winsorization limits for scoring
winsorize:
  lower: 0.01
  upper: 0.99

# PE valuation ranges
valuation:
  pe_negative_penalty: true
  pe_extreme_threshold: 200
  pe_reasonable_low: 0
  pe_reasonable_high: 30

# Default benchmark index
benchmark: "hs300"  # 沪深300
benchmark_code: "000300"

# Index codes
indices:
  hs300: "000300"
  zz500: "000905"
  zz1000: "000852"
  sh_composite: "000001"
  sz_component: "399001"
  gem: "399006"
  star50: "000688"
