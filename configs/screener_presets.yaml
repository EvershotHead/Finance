    min_data_quality_score: 60
  stages:
    - name: "流动性筛选"
      logic: "AND"
      rules:
        - { field: "avg_amount_20d", operator: ">=", value: 50000000 }
    - name: "估值筛选"
      logic: "AND"
      rules:
        - { field: "pe_ttm", operator: ">", value: 0 }
    - name: "数据质量"
      logic: "AND"
      rules:
        - { field: "data_quality_score", operator: ">=", value: 60 }
  ranking:
    score_model: "balanced"
    sort_by: "total_score"
    ascending: false
    top_n: 50
